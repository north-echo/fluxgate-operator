replicaCount: 1

image:
  repository: quay.io/north-echo/fluxgate-operator
  tag: ""  # defaults to chart appVersion
  pullPolicy: IfNotPresent

github:
  # Create a secret with: kubectl create secret generic fluxgate-github-token --from-literal=token=ghp_xxx
  tokenSecretName: fluxgate-github-token
  tokenSecretKey: token

serviceAccount:
  create: true
  name: fluxgate-operator

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
