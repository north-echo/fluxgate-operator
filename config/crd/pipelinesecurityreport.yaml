apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pipelinesecurityreports.fluxgate.north-echo.dev
spec:
  group: fluxgate.north-echo.dev
  names:
    kind: PipelineSecurityReport
    listKind: PipelineSecurityReportList
    plural: pipelinesecurityreports
    singular: pipelinesecurityreport
    shortNames:
      - psr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Compliance
          type: string
          jsonPath: .status.complianceState
        - name: Repository
          type: string
          jsonPath: .status.source.repository
      schema:
        openAPIV3Schema:
          type: object
          description: PipelineSecurityReport represents a security evaluation of a CI/CD pipeline source.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            status:
              type: object
              properties:
                complianceState:
                  type: string
                  enum:
                    - Compliant
                    - Warning
                    - NonCompliant
                    - Critical
                lastEvaluated:
                  type: string
                  format: date-time
                source:
                  type: object
                  properties:
                    repository:
                      type: string
                    branch:
                      type: string
                    workflowPath:
                      type: string
                summary:
                  type: object
                  properties:
                    critical:
                      type: integer
                    high:
                      type: integer
                    medium:
                      type: integer
                    low:
                      type: integer
                    info:
                      type: integer
                    total:
                      type: integer
                correlatedWorkloads:
                  type: array
                  items:
                    type: object
                    properties:
                      kind:
                        type: string
                      name:
                        type: string
                      namespace:
                        type: string
                findings:
                  type: array
                  items:
                    type: object
                    properties:
                      rule:
                        type: string
                      severity:
                        type: string
                      file:
                        type: string
                      line:
                        type: integer
                      message:
                        type: string
                      remediation:
                        type: string
